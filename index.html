  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --white:   #ffffff;
      --snow:    #ffffff;
      --blush:   #ffffff;
      --pink:    #e8a4a8;
      --rose:    #c97279;
      --deep:    #a04f56;
      --ink:     #2e1a1c;
      --muted:   #6b4a4d;
    }

    html, body { height: 100%; color-scheme: light only; }

    body {
      background: var(--snow);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family: 'Jost', sans-serif;
      color: var(--ink);
      padding: 30px 20px;
      gap: 28px;
    }



    .scene {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      width: 100%;
    }

    /* HEADER */
    .header {
      text-align: center;
      opacity: 0;
      animation: rise 0.9s ease forwards 0.1s;
    }

    .header .eyebrow {
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 10px;
    }

    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.2rem, 6vw, 3.4rem);
      color: var(--ink);
      line-height: 1.1;
    }

    .header h1 em {
      font-style: italic;
      color: var(--rose);
    }

    /* BOX */
    .box-wrap {
      perspective: 600px;
      opacity: 0;
      animation: rise 0.9s ease forwards 0.35s;
    }

    .box {
      width: 120px;
      cursor: pointer;
      user-select: none;
      filter: drop-shadow(0 12px 32px rgba(160,79,86,0.18));
      transition: filter 0.3s ease, transform 0.15s ease;
    }

    .box:hover { filter: drop-shadow(0 18px 40px rgba(160,79,86,0.28)); }
    .box:active { transform: scale(0.97); }

    .lid {
      width: 126px;
      height: 30px;
      background: var(--rose);
      border-radius: 6px 6px 0 0;
      position: relative;
      left: -4px;
      transform-origin: top center;
      transform-style: preserve-3d;
      transform: rotateX(0deg);
      transition: transform 0.65s cubic-bezier(0.34, 1.4, 0.64, 1);
      z-index: 2;
    }

    .box.open .lid { transform: rotateX(-115deg); }

    .bow {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 28px;
    }

    .bow-l, .bow-r {
      width: 20px;
      height: 14px;
      background: var(--deep);
      border-radius: 50%;
      opacity: 0.85;
    }
    .bow-l { transform: rotate(-30deg) translateX(3px); }
    .bow-r { transform: rotate(30deg) translateX(-3px); }
    .bow-dot {
      position: absolute;
      width: 10px; height: 10px;
      background: var(--deep);
      border-radius: 50%;
      z-index: 1;
    }

    .body {
      width: 120px;
      height: 84px;
      background: var(--pink);
      border-radius: 0 0 8px 8px;
      position: relative;
      overflow: hidden;
    }

    .ribbon-h {
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 14px;
      background: var(--rose);
      opacity: 0.4;
      transform: translateY(-50%);
    }
    .ribbon-v {
      position: absolute;
      top: 0; bottom: 0; left: 50%;
      width: 14px;
      background: var(--rose);
      opacity: 0.4;
      transform: translateX(-50%);
    }

    /* HINT */
    .hint {
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: rise 0.9s ease forwards 0.55s;
    }

    /* CARD */
    .card-wrap {
      width: min(400px, 88vw);
      opacity: 0;
      animation: rise 0.9s ease forwards 0.7s;
    }

    .card {
      background: var(--white);
      border-radius: 20px;
      padding: 28px 28px 24px;
      border: 1px solid var(--blush);
      box-shadow: 0 4px 40px rgba(160,79,86,0.08);
      position: relative;
      min-height: 90px;
    }

    .card::before {
      content: '\201C';
      position: absolute;
      top: 12px; left: 20px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 5rem;
      line-height: 1;
      color: var(--blush);
      pointer-events: none;
    }

    .card-msg {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.3rem;
      line-height: 1.85;
      color: var(--ink);
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      min-height: 2em;
    }

    .card-msg.show { opacity: 1; transform: translateY(0); }

    .card-sig {
      margin-top: 20px;
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--rose);
      text-align: right;
      opacity: 0;
      transition: opacity 0.5s ease 0.2s;
    }
    .card-sig.show { opacity: 1; }

    /* HEARTS */
    .heart {
      position: fixed;
      pointer-events: none;
      font-size: 1.1rem;
      animation: heartUp 1.4s ease forwards;
      z-index: 999;
    }

    @keyframes heartUp {
      0%   { transform: translateY(0) scale(0.5); opacity: 1; }
      100% { transform: translateY(-110px) scale(1.1); opacity: 0; }
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1c1c1e; color: #f2f2f2; }
      .header h1 { color: #f2f2f2; }
      .header .eyebrow { color: #e8a4a8; }
      .header h1 em { color: #e8a4a8; }
      .hint { color: #c9a0a3; }
      .card { background: #2c2426; border-color: #3e2d2e; box-shadow: 0 4px 40px rgba(0,0,0,0.3); }
      .card::before { color: #3e2d2e; }
      .card-msg { color: #f5e8e8; }
      .card-sig { color: #e8a4a8; }
    }

    /* PHOTO */
    .photo-wrap {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--pink);
      margin: 0 auto 16px;
      box-shadow: 0 4px 20px rgba(160,79,86,0.2);
    }
    .couple-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 35%;
      transform: scale(1.35);
      transform-origin: center 40%;
    }


    /* FORM */
    .form-wrap {
      width: min(400px, 88vw);
      opacity: 0;
      animation: rise 0.9s ease forwards 0.85s;
    }

    .form-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 14px;
      letter-spacing: 0.05em;
    }

    .form-inner {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .form-inner textarea {
      width: 100%;
      border: 1px solid var(--blush);
      border-radius: 14px;
      padding: 16px 18px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.05rem;
      color: var(--ink);
      background: var(--white);
      resize: none;
      outline: none;
      line-height: 1.6;
      transition: border-color 0.2s;
    }

    .form-inner textarea:focus {
      border-color: var(--pink);
    }

    .form-inner textarea::placeholder {
      color: var(--pink);
      opacity: 0.7;
    }

    .send-btn {
      align-self: flex-end;
      background: var(--rose);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 10px 26px;
      font-family: 'Jost', sans-serif;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .send-btn:hover { background: var(--deep); }
    .send-btn:active { transform: scale(0.96); }

    .form-success {
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--rose);
      display: none;
      padding: 14px 20px;
      background: white;
      border: 1px solid var(--blush);
      border-radius: 14px;
      margin-top: 8px;
      transition: opacity 0.4s ease;
      box-shadow: 0 4px 20px rgba(160,79,86,0.1);
    }

    @media (prefers-color-scheme: dark) {
      .form-inner textarea {
        background: #2c2426;
        border-color: #3e2d2e;
        color: #f5e8e8;
      }
      .form-inner textarea::placeholder { color: #e8a4a8; }
    }

    .version {
      font-size: 0.6rem;
      color: var(--pink);
      opacity: 0.4;
      letter-spacing: 0.1em;
      text-align: center;
      padding-bottom: 10px;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="scene">

    "Non sottovalutarti mai! Sei molto più forte di quanto pensi.",
    "Sono orgoglioso di averti accanto.",
    "Promemoria ufficiale! Sei speciale non dimenticarlo.",
    "Ti meriti cose belle, poche storie.",
    "Hai vinto una pizza rustica.",
    "Avere qualcuno come te nella propria vita è un bel colpo di fortuna.",
    "Forza Inter! Questa è la 50ª frase, dovevo per forza.",
    "Non serve che tu sia perfetta per essere straordinaria.",
    "Chiara, sei la migliore!",
    "Anche nei giorni storti riesci a essere speciale.",
    "Se la giornata è complicata, ricordati che non sei sola.",
    "Io sono qui per sostenerti, sempre.",
    "Sei una di quelle persone che vale la pena incontrare nella vita.",
    "Difenderò sempre l'ananas sulla pizza, proprio come difendo te.",
    "Sei una presenza che rende tutto un po' più luminoso.",
    "Io credo molto in te, anche quando tu magari dimentichi di farlo.",
    "Nel dubbio scegli la cosa che ti fa stare bene, io sono d'accordo.",
    "Ti meriti cose belle e giorni sereni.",
    "Comunque io faccio il tifo per te..",
    "Oh comunque sei forte davvero, anche quando non ti sembra.",
    "Io sono qui, anche quando non sai bene cosa dire.",
    "Sei radiosa, non dimenticare di splendere.",
    "Comunque vada la giornata, io sono contento che tu esista."
  ];

  let pool = shuffle([...Array(messages.length).keys()]);
  let isOpen = false;
  let timer = null;

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function handleClick() {
    if (isOpen) { closeBox(); return; }
    openBox();
  }

  function openBox() {
    isOpen = true;
    document.getElementById('box').classList.add('open');
    if (pool.length === 0) pool = shuffle([...Array(messages.length).keys()]);
    const idx = pool.pop();
    setTimeout(() => showMessage(messages[idx]), 420);
    spawnHearts();
    clearTimeout(timer);
    timer = setTimeout(closeBox, 5500);
    document.getElementById('hint').textContent = 'Tocca ancora per un nuovo messaggio';
  }

  function closeBox() {
    isOpen = false;
    document.getElementById('box').classList.remove('open');
    const msg = document.getElementById('msg');
    const sig = document.getElementById('sig');
    msg.classList.remove('show');
    sig.classList.remove('show');
  }

  function showMessage(text) {
    const msg = document.getElementById('msg');
    const sig = document.getElementById('sig');
    msg.classList.remove('show');
    sig.classList.remove('show');
    msg.textContent = text;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      msg.classList.add('show');
      sig.classList.add('show');
    }));
  }

  function spawnHearts() {
    const box = document.getElementById('box');
    const rect = box.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + 10;
    ['♡','♡','♡','♡','♡'].forEach((h, i) => {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'heart';
        el.textContent = h;
        el.style.color = i % 2 === 0 ? '#c97279' : '#e8a4a8';
        el.style.left = (cx + (Math.random() - 0.5) * 70) + 'px';
        el.style.top  = cy + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1500);
      }, i * 110);
    });
  }

  async function sendMessage() {
    const text = document.getElementById('formMsg').value.trim();
    if (!text) return;
    try {
      const res = await fetch('https://formspree.io/f/maqpzywl', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      if (res.ok) {
        document.getElementById('formMsg').value = '';
        const success = document.getElementById('formSuccess');
        success.style.display = 'block';
        success.style.opacity = '1';
        success.style.transform = 'translateY(0)';
        setTimeout(() => {
          success.style.opacity = '0';
          setTimeout(() => { success.style.display = 'none'; success.style.opacity = '1'; }, 400);
        }, 2800);
      }
    } catch(e) { console.error(e); }
  }
</script>
